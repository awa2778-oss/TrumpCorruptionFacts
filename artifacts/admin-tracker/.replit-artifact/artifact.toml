kind = "web"
previewPath = "/"
title = "Administration Action Tracker"
version = "1.0.0"
id = "artifacts/admin-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25605

[services.development]
run = "pnpm --filter @workspace/admin-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-tracker", "run", "build" ]
publicDir = "artifacts/admin-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25605"
BASE_PATH = "/"
