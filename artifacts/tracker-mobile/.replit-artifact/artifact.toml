kind = "mobile"
previewPath = "/tracker-mobile/"
title = "Admin Tracker Mobile"
version = "1.0.0"
id = "artifacts/tracker-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/tracker-mobile/" ]
localPort = 25490

[services.development]
run = "pnpm --filter @workspace/tracker-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tracker-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tracker-mobile", "run", "serve" ]

[services.env]
PORT = "25490"
BASE_PATH = "/tracker-mobile/"
