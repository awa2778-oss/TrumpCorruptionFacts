name: Build Android App Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/tracker-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Set up Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android App Bundle
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
        env:
          EXPO_PUBLIC_DOMAIN: ${{ secrets.EXPO_PUBLIC_DOMAIN }}
